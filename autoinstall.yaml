#cloud-config
autoinstall:
  version: 1

  identity:
    hostname: elgentos-ubuntu-p14s
    username: elgentos

  shutdown: poweroff

  timezone: Europe/Amsterdam

  keyboard:
    layout: us

  drivers:
    install: true

  ssh:
    install-server: true
    allow-pw: true

  storage:
    layout:
      name: lvm
      password: pleasechangemeasap
      encrypted: yes

  interactive-sections:
    - network
    - identity

  packages:
    - build-essential
    - composer
    - curl
    - dnsutils
    - fonts-powerline
    - gimp
    - git
    - gpg
    - gnome-browser-connector
    - gnome-shell-extensions
    - gnome-tweaks
    - htop
    - httrack
    - jq
    - lsb-release
    - multitail
    - ncdu
    - python3-pip
    - python3-setuptools
    - python3-venv
    - silversearcher-ag
    - tig
    - traceroute
    - ubuntu-desktop
    - ufw
    - vim
    - vlc
    - wget
    - xclip
    - zsh

  snaps:
    - name: chromium
    - name: discord
    - name: gcolor3
    - name: postman
    - name: phpstorm
    - name: spotify
    - name: sqlitebrowser
    - name: steam
    - name: slack

  late-commands:
    # Set shell to zsh for elgentos user (created by interactive identity section)
    - curtin in-target --target=/target -- chsh -s /bin/zsh elgentos

    # Grant passwordless sudo so magebox bootstrap can install system packages
    - curtin in-target --target=/target -- bash -c 'echo "elgentos ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/elgentos && chmod 0440 /etc/sudoers.d/elgentos'

    # Resize 100GB partition to full space available
    - curtin in-target --target=/target -- lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
    - curtin in-target --target=/target -- resize2fs /dev/mapper/ubuntu--vg-ubuntu--lv

    # Install Brave
    - curtin in-target --target=/target -- bash -c "wget -qO- https://dl.brave.com/install.sh | sh"

    # Installing Warp
    - curtin in-target --target=/target -- bash -c "wget --content-disposition -O /tmp/warp.deb 'https://app.warp.dev/download?package=deb' && dpkg -i /tmp/warp.deb"

    # Raise inotify watches limit
    - curtin in-target --target=/target -- sh -c 'echo "fs.inotify.max_user_watches=524288" >> /etc/sysctl.conf'
    - curtin in-target --target=/target -- sh -c 'echo "fs.inotify.max_user_instances=512" >> /etc/sysctl.conf'
    - curtin in-target --target=/target -- sh -c 'sysctl -p'

    # Installing 1password-cli
    - curtin in-target --target=/target -- bash -c '
      apt-get update && apt-get install -y curl gpg &&
      curl -sS https://downloads.1password.com/linux/keys/1password.asc |
      gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg &&
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main" |
      tee /etc/apt/sources.list.d/1password.list &&
      apt update &&
      apt install -y 1password'

    # Install docker and docker compose plugin
    - curtin in-target --target=/target -- bash -c '
      apt update &&
      apt install -y ca-certificates curl &&
      install -m 0755 -d /etc/apt/keyrings &&
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc &&
      chmod a+r /etc/apt/keyrings/docker.asc &&
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" |
      tee /etc/apt/sources.list.d/docker.list > /dev/null &&
      apt update &&
      apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin &&
      usermod -aG docker elgentos'

    # Install oh-my-zsh
    - curtin in-target --target=/target -- su - elgentos -c 'wget -qO- https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh | bash'

    # Install nvm
    - curtin in-target --target=/target -- su - elgentos -c 'wget -qO- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.2/install.sh | bash'

    # Prepare Homebrew prefix directory with correct ownership
    - curtin in-target --target=/target -- bash -c 'mkdir -p /home/linuxbrew/.linuxbrew && chown -R elgentos:elgentos /home/linuxbrew'

    # Install Homebrew
    - curtin in-target --target=/target -- su - elgentos -c '
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" &&
      echo "eval \"\$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)\"" >> ~/.zshrc'

    # Install MageBox via Homebrew
    - curtin in-target --target=/target -- su - elgentos -c '
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)" &&
      brew install qoliber/magebox/magebox &&
      magebox bootstrap --unattended --tld=localhost &&
      mkdir -p ~/workspace/elgentos/example/pub &&
      cd ~/workspace/elgentos/example && magebox init elgentos.example &&
      echo "<?php phpinfo();" > ~/workspace/elgentos/example/pub/index.php'

    # Install Backblaze B2 CLI in a virtual environment
    - curtin in-target --target=/target -- su - elgentos -c '
      python3 -m venv ~/b2-venv &&
      source ~/b2-venv/bin/activate &&
      pip install --upgrade pip &&
      pip install b2'

    # Install Claude Code
    - curtin in-target --target=/target -- su - elgentos -c '
      export NVM_DIR="$HOME/.nvm" &&
      . "$NVM_DIR/nvm.sh" &&
      nvm install --lts &&
      npm install -g @anthropic-ai/claude-code'
